name: JMeter Performance Tests
on:
  push:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  performance-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download Apache JMeter
        run: |
          wget -q https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz && mv apache-jmeter-5.6.3 jmeter

      - name: List test files
        run: |
          echo "=== Repository structure ==="
          ls -la
          echo "=== Tests folder ==="
          ls -la tests/ || echo "tests folder not found"

      - name: Run Performance Tests
        run: |
          mkdir -p results reports
          jmeter/bin/jmeter -n \
            -t tests/load_test.jmx \
            -l results/results.jtl \
            -e -o reports/
          echo "=== Reports folder contents ==="
          ls -la reports/ || echo "reports folder empty"

      - name: Upload HTML Report as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-report
          path: reports/
          if-no-files-found: warn
